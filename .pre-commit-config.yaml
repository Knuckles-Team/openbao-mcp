repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
- repo: local
  hooks:
  - id: security-sanitizer
    name: Security and Garbage Sanitizer
    entry: python scripts/security_sanitizer.py
    language: python
    pass_filenames: false
    always_run: true
